id: date-time-example
name: Date and Time Example
description: Shows multiple terminal nodes and different display types
version: 1.0.0

nodes:
  - id: terminal-date
    type: terminal
    position:
      x: 100
      y: 100
    size:
      width: 600
      height: 300
    label: Terminal 1
    inputs:
      - id: stdin
        name: stdin
        type: input
    outputs:
      - id: stdout
        name: stdout
        type: output

  - id: terminal-time
    type: terminal
    position:
      x: 100
      y: 440
    size:
      width: 600
      height: 300
    label: Terminal 2
    inputs:
      - id: stdin
        name: stdin
        type: input
    outputs:
      - id: stdout
        name: stdout
        type: output

  - id: display-date
    type: display
    position:
      x: 740
      y: 100
    label: Output 1
    displayType: text
    content: ''
    inputs:
      - id: input
        name: input
        type: input
    outputs: []

  - id: display-time
    type: display
    position:
      x: 740
      y: 340
    label: Output 2
    displayType: text
    content: ''
    inputs:
      - id: input
        name: input
        type: input
    outputs: []

  - id: input-slider
    type: input
    position:
      x: 900
      y: 200
    label: Refresh Interval
    inputType: slider
    value: 50
    min: 0
    max: 100
    step: 10
    inputs: []
    outputs:
      - id: value
        name: value
        type: output

  - id: display-slider
    type: display
    position:
      x: 1200
      y: 200
    label: Slider Value
    displayType: text
    content: ''
    inputs:
      - id: input
        name: input
        type: input
    outputs: []

connections:
  - from: terminal-date
    to: display-date
    fromPort: stdout
    toPort: input
  
  - from: terminal-time
    to: display-time
    fromPort: stdout
    toPort: input

  - from: input-slider
    to: display-slider
    fromPort: value
    toPort: input
