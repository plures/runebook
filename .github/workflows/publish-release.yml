name: Build and Publish Release

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build (e.g. v1.2.3)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  setup:
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'workflow_dispatch'
    outputs:
      release_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Determine release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            SHA="${{ github.event.workflow_run.head_sha }}"
            if [ -z "$SHA" ]; then
              echo "Error: github.event.workflow_run.head_sha is empty; cannot determine tag." >&2
              exit 1
            fi
            git fetch --tags --force
            TAG="$(git tag --points-at "$SHA" | head -n 1)"
            if [ -z "$TAG" ]; then
              echo "Error: No tag found that points at commit $SHA." >&2
              exit 1
            fi
          fi
          if [ -z "$TAG" ]; then
            echo "Error: Could not determine release tag (TAG is empty)." >&2
            exit 1
          fi
          case "$TAG" in
            v[0-9]*.[0-9]*.[0-9]*)
              ;;
            *)
              echo "Error: Invalid release tag '$TAG'. Expected format like v1.2.3." >&2
              exit 1
              ;;
          esac
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

  build-tauri:
    needs: setup
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.release_tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.setup.outputs.release_tag }}
          args: ${{ matrix.args }}

  build-android:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.release_tag }}
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android
      - run: npm ci
      - name: Initialize Tauri Android project
        run: npx tauri android init --ci
        env:
          NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
      - run: npx tauri android build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
      - name: Upload unsigned APK to release
        if: needs.setup.outputs.release_tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ needs.setup.outputs.release_tag }}
        run: |
          gh release upload "$TAG_NAME" \
            src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk \
            --clobber

  publish-npm:
    needs: setup
    if: github.event_name == 'workflow_run'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.release_tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true

  publish-github-packages:
    needs: setup
    if: github.event_name == 'workflow_run'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.release_tag }}

      - name: Setup Node.js for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@plures'

      - name: Install dependencies
        run: npm ci

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  winget-publish:
    needs: setup
    if: github.event_name == 'workflow_run'
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.release_tag }}

      - name: Get release version
        id: version
        shell: bash
        run: |
          VERSION="${{ needs.setup.outputs.release_tag }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Publish to winget
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: Plures.RuneBook
          version: ${{ steps.version.outputs.version }}
          installers-regex: '\.msi$'
          token: ${{ secrets.WINGET_GITHUB_TOKEN }}
        continue-on-error: true

  nixos-publish:
    needs: setup
    if: github.event_name == 'workflow_run'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.release_tag }}

      - name: Get release version
        id: version
        shell: bash
        run: |
          VERSION="${{ needs.setup.outputs.release_tag }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Build Nix packages
        run: |
          nix build .#runebook .#runebook-agent --out-link ./nix-results

      - name: Upload Nix build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nix-packages
          path: nix-results
          retention-days: 90

      - name: Note about NixOS package submission
        run: |
          echo "## NixOS Package Publishing" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Nix packages have been built successfully. To publish to NixOS:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "1. Submit a PR to nixpkgs with the package definition" >> $GITHUB_STEP_SUMMARY
          echo "2. Or use the flake directly: nix run github:plures/runebook" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Current version**: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
        continue-on-error: true
