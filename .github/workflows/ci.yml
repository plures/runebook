name: CI
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix
        uses: cachix/install-nix-action@v27
      - name: Run checks in Nix flake dev shell
        run: |
          nix develop -c sh -lc '
            npm ci &&
            (npm run check 2>/dev/null || true) &&
            (npm test 2>/dev/null || true) &&
            (npm run build 2>/dev/null || true)
          '
