name: CI
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix
        uses: cachix/install-nix-action@v27
      - name: Run checks in Nix flake dev shell
        run: |
          nix develop -c sh -lc '
            npm ci &&
            (npm run check 2>/dev/null || true) &&
            (npm test 2>/dev/null || true) &&
            (npm run build 2>/dev/null || true)
          '

  rust:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: cargo fmt
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check
      - name: cargo clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -W clippy::all -D warnings
      - name: cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml
